name: Xiaomi Mi Pad 4 (LineageOS 22) [clover] ReSukiSU

on:
  workflow_call:
  workflow_dispatch:

env:
  DEVICE_NAME : "MiPad4"
  DEVICE_CODENAME : "clover"

  CUSTOM_CMDS : "CLANG_TRIPLE=aarch64-linux-gnu-"
  EXTRA_CMDS : "LD=ld.lld LLVM=1 LLVM_IAS=1"

  KERNEL_SOURCE : "https://github.com/pix106/android_kernel_xiaomi_southwest-4.19.git"
  KERNEL_BRANCH : "main"

  CLANG_SOURCE : "https://github.com/llvm/llvm-project/releases/download/llvmorg-19.1.7/LLVM-19.1.7-Linux-X64.tar.xz"
  CLANG_BRANCH : ""

  GCC_GNU : false
  GCC_64_SOURCE : "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9.git"
  GCC_64_BRANCH : "android12L-release"
  GCC_32_SOURCE : "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9.git"
  GCC_32_BRANCH : "android12L-release"

  DEFCONFIG_SOURCE: ""
  DEFCONFIG_NAME : "clover_defconfig"
  DEFCONFIG_ORIGIN_IMAGE: ""
  DEFCONFIG_FROM_BOOT: false

  KERNELSU_SOURCE : ""
  KERNELSU_BRANCH : ""
  KERNELSU_NAME : ""

  KERNELSU_AUTO_GET : "true"
  KERNELSU_AUTO_FORK : "sukisu"        # 根据示例，resukisu 是有效值
  KERNELSU_METHOD: "shell"

  SUSFS_ENABLE : true
  SUSFS_FIXED : true

  PATCHES_SOURCE: "PeterTea5822/NonGKI_Kernel_Patches"
  PATCHES_BRANCH: "main"
  SUSFS_FOLDER_FIXED: ""
  SUSFS_PATCH_FIXED: ""

  AK3_SOURCE : "https://github.com/osm0sis/AnyKernel3.git"
  AK3_BRANCH : "master"
  BOOT_SOURCE : ""

  NEED_DTBO : false
  NEED_SAFE_DTBO : false

  ROM_TEXT : "lineageos_a15"

  PYTHON_VERSION: "3"
  PACK_METHOD: "Anykernel3"
  PACK_KMODULES: "false"

  REKERNEL_ENABLE: "false"
  HOOK_METHOD: "syscall"                 # 保持示例默认值
  KERNEL_PATCH: "true"                   # 4.19 内核需要这个
  KPM_ENABLE: "false"
  KPM_INLINE: "false"
  KPM_KPATCH_NEXT: "false"
  KPM_PATCH_SOURCE: ""

  BASEBAND_GUARD_ENABLE: "false"
  BASEBAND_GUARD_BOOT: "false"

  HIDE_STUFF: "false"
  GENERATE_DTB: "false"
  BUILD_DEBUGGER: "false"
  SKIP_PATCH: "false"
  BUILD_OTHER_CONFIG: "false"
  FREE_MORE_SPACE: "false"

jobs:
  build-kernel:
    name: Xiaomi Mi Pad 4 (LineageOS 22) [clover] ReSukiSU
    runs-on: ubuntu-latest
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"

    steps:
      - name: ⏰ Checkout repository
        uses: actions/checkout@v6

      - name: ⌛️ Compilation environment preparation
        uses: ./.github/workflows/build-env

      - name: ⚙️ Get necessary tools
        uses: ./.github/workflows/build-ready

      - name: 🪝 Patch Kernel of SUSFS
        uses: ./.github/workflows/patch-susfs

      - name: 🔗 Patch for no-kprobe
        uses: ./.github/workflows/patch-no-kprobe

      - name: 🪛 Extra Kernel Options (Source-level fixes for SukiSU Ultra on 4.19)
        run: |
          cd $GITHUB_WORKSPACE/device_kernel

          # 1. 统一目录名称 (SukiSU 脚本可能生成 kernelus 或 kernelsu)
          if [ -d "drivers/kernelus" ]; then
            echo "Renaming drivers/kernelus to drivers/kernelsu"
            mv drivers/kernelus drivers/kernelsu
          elif [ -d "drivers/kernelsu" ]; then
            echo "drivers/kernelsu already exists"
          elif [ -d "KernelSU" ]; then
            mv KernelSU/kernel drivers/kernelsu
            rm -rf KernelSU
          elif [ -d "kernelsu" ]; then
            mv kernelsu/kernel drivers/kernelsu
            rm -rf kernelsu
          fi

          if [ ! -d "drivers/kernelsu" ]; then
            echo "ERROR: Cannot find drivers/kernelsu after all attempts!"
            exit 1
          fi

          KSU_DIR="drivers/kernelsu"

          # 2. 修复 adb_root.h 中缺失的 'struct user_arg_ptr' 声明
          # 在 4.19 中此结构体定义于 linux/uaccess.h 或 asm-generic/uaccess.h
          ADB_HEADER="${KSU_DIR}/feature/adb_root.h"
          if [ -f "$ADB_HEADER" ]; then
            echo "Patching $ADB_HEADER"
            # 在文件开头添加前向声明（如果未声明则补一个空结构体）
            sed -i '1s/^/struct user_arg_ptr {};\n/' "$ADB_HEADER"
            # 或者尝试包含必要的头文件（可能不生效，用前向声明更安全）
            # sed -i '1i #include <linux/uaccess.h>' "$ADB_HEADER"
          fi

          # 3. 修复 adb_root.c 中同样的声明问题 (如果存在)
          ADB_SRC="${KSU_DIR}/feature/adb_root.c"
          if [ -f "$ADB_SRC" ]; then
            echo "Patching $ADB_SRC"
            sed -i '1s/^/struct user_arg_ptr {};\n/' "$ADB_SRC"
          fi

          # 4. 修复 sucompat.c (可能也需要)
          SUCOMPAT="${KSU_DIR}/feature/sucompat.c"
          if [ -f "$SUCOMPAT" ]; then
            echo "Patching $SUCOMPAT"
            sed -i '1s/^/struct user_arg_ptr {};\n/' "$SUCOMPAT"
          fi

          # 5. 修复 sulog/event.c 中未闭合的 #ifdef
          EVENT_C="${KSU_DIR}/sulog/event.c"
          if [ -f "$EVENT_C" ]; then
            echo "Patching $EVENT_C"
            # 查找 #ifdef CONFIG_KSU_SUSFS 并在文件末尾补上 #endif（如果缺失）
            if grep -q "#ifdef CONFIG_KSU_SUSFS" "$EVENT_C"; then
              if ! tail -n 20 "$EVENT_C" | grep -q "#endif"; then
                echo "#endif /* CONFIG_KSU_SUSFS */" >> "$EVENT_C"
              fi
            fi
            # 同时也处理可能的多行语法错误：简单粗暴地注释掉第297行前后有问题的行
            sed -i '296,298s/^/\/\//' "$EVENT_C" 2>/dev/null || true
          fi

          # 6. 处理 Makefile 中的文件名不一致问题 (kusu.c vs ksu.c)
          # SukiSU Ultra 的 Makefile 可能写 'obj-$(CONFIG_KSU) += kusu.o' 但实际文件叫 ksu.c
          # 我们将所有的 kusu.o 改为 ksu.o，或者反过来，视实际文件而定
          MAKE_FILE="${KSU_DIR}/Makefile"
          if [ -f "$MAKE_FILE" ]; then
            # 如果 Makefile 里写的是 kusu.o 但实际存在 ksu.c
            if grep -q "kusu.o" "$MAKE_FILE" && [ -f "${KSU_DIR}/ksu.c" ]; then
              sed -i 's/kusu.o/ksu.o/g' "$MAKE_FILE"
            fi
            # 如果写的是 ksu.o 但实际存在 kusu.c
            if grep -q "ksu.o" "$MAKE_FILE" && [ -f "${KSU_DIR}/kusu.c" ]; then
              sed -i 's/ksu.o/kusu.o/g' "$MAKE_FILE"
            fi
          fi

          # 7. 注入内核配置 (确保 SUSFS 和 Manual Hook 启用)
          DEFCONFIG="arch/arm64/configs/${{ env.DEFCONFIG_NAME }}"
          cat >> "$DEFCONFIG" << 'EOF'
          CONFIG_KALLSYMS=y
          CONFIG_KALLSYMS_ALL=y
          CONFIG_KSU=y
          CONFIG_KSU_MANUAL_HOOK=y
          CONFIG_KSU_SUSFS=y
          # CONFIG_KSU_WITH_KPROBES is not set
          EOF

          # 8. 重新生成 .config
          mkdir -p out
          make ARCH=arm64 O=out ${{ env.DEFCONFIG_NAME }}
          make ARCH=arm64 O=out olddefconfig

          echo "Source-level fixes applied for SukiSU Ultra on 4.19"

      - name: 🧰 Patch Kernel of Re:Kernel
        uses: ./.github/workflows/patch-rekernel

      - name: 🔒 Patch Kernel of Baseband Guard
        uses: ./.github/workflows/patch-baseband-guard

      - name: 🔧 Patch Hide Stuff
        uses: ./.github/workflows/patch-hide-stuff

      - name: 🚀 Build Process
        uses: ./.github/workflows/build-process

      - name: 🔩 Pack Process
        uses: ./.github/workflows/pack-process

      - name: ✏️ Upload Build Artifact (Absolute capture)
        uses: ./.github/workflows/upload-files
