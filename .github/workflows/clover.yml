name: Build Kernel for MiPad4 (clover) with ReSukiSU + Manual Hook

on:
  workflow_call:
  workflow_dispatch:

env:
  DEVICE_NAME : "MiPad4"
  DEVICE_CODENAME : "clover"

  CUSTOM_CMDS : "CLANG_TRIPLE=aarch64-linux-gnu-"
  EXTRA_CMDS : "LD=ld.lld LLVM=1 LLVM_IAS=1"

  KERNEL_SOURCE : "https://github.com/pix106/android_kernel_xiaomi_southwest-4.19.git"
  KERNEL_BRANCH : "main"

  CLANG_SOURCE : "https://github.com/llvm/llvm-project/releases/download/llvmorg-19.1.7/LLVM-19.1.7-Linux-X64.tar.xz"
  CLANG_BRANCH : ""

  GCC_GNU : false
  GCC_64_SOURCE : "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9.git"
  GCC_64_BRANCH : "android12L-release"
  GCC_32_SOURCE : "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/x86/x86_64-linux-android-4.9.git"
  GCC_32_BRANCH : "android12L-release"

  DEFCONFIG_SOURCE: ""
  DEFCONFIG_NAME : "clover_defconfig"
  DEFCONFIG_ORIGIN_IMAGE: ""
  DEFCONFIG_FROM_BOOT: false

  KERNELSU_SOURCE : "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh"
  KERNELSU_BRANCH : "main"
  KERNELSU_NAME : "ReSukiSU"
  KERNELSU_AUTO_GET : "true"
  KERNELSU_AUTO_FORK : "resukisu"
  KERNELSU_METHOD: "shell"

  SUSFS_ENABLE : true
  SUSFS_FIXED : true

  PATCHES_SOURCE: "PeterTea5822/NonGKI_Kernel_Patches"
  PATCHES_BRANCH: "main"
  SUSFS_FOLDER_FIXED: ""
  SUSFS_PATCH_FIXED: ""

  AK3_SOURCE : "https://github.com/osm0sis/AnyKernel3.git"
  AK3_BRANCH : "master"
  BOOT_SOURCE : "https://github.com/boot_author/android_kernel_codename/raw/refs/heads/main/rom/source_imgs/boot.img"

  PACK_METHOD: "Anykernel3"
  PACK_KMODULES: "false"

  PYTHON_VERSION: "3"
  ROM_TEXT : "lineageos_a15"
  NEED_DTBO : false
  NEED_SAFE_DTBO : false
  REKERNEL_ENABLE: "false"
  HOOK_METHOD: "manual"          # 仍设 manual，但具体宏由脚本从 Kconfig 读取
  KERNEL_PATCH: "true"
  KPM_ENABLE: "false"
  KPM_INLINE: "false"
  HIDE_STUFF: "false"
  GENERATE_DTB: "false"
  BUILD_DEBUGGER: "false"

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-latest

    steps:
      - name: ⏰ Checkout repository
        uses: actions/checkout@v6

      - name: ⌛️ Compilation environment preparation
        uses: ./.github/workflows/build-env

      - name: ⚙️ Get necessary tools
        uses: ./.github/workflows/build-ready

      - name: 🪝 Patch Kernel of SUSFS
        uses: ./.github/workflows/patch-susfs

      - name: 🔗 Patch for no-kprobe
        uses: ./.github/workflows/patch-no-kprobe

      - name: 🪛 Extra Kernel Options (Auto‑detect Manual Hook from Kconfig)
        run: |
          set -e
          cd $GITHUB_WORKSPACE/device_kernel

          # 1. 确保 ReSukiSU 源码在 drivers/kernelsu（build‑ready 可能已执行 setup.sh）
          if [ -d "KernelSU" ]; then
            rm -rf drivers/kernelsu
            mv KernelSU/kernel drivers/kernelsu
            rm -rf KernelSU
          elif [ -d "kernelsu" ]; then
            rm -rf drivers/kernelsu
            mv kernelsu/kernel drivers/kernelsu
            rm -rf kernelsu
          fi
          [ ! -d "drivers/kernelsu" ] && { echo "ERROR: drivers/kernelsu missing!"; exit 1; }

          # 2. 动态检测 Kconfig 中 Manual Hook 的正确宏名
          MANUAL_CONF=""
          # 先找形如 "config KSU_MANUAL_HOOK" 或 "config KSU_HOOK_MANUAL" 的条目
          if [ -f drivers/kernelsu/Kconfig ]; then
            MANUAL_CONF=$(awk '/^config KSU.*[Mm]anual/{print $2}' drivers/kernelsu/Kconfig | head -1)
          fi
          # 如果没找到，尝试在内核树其它地方搜索（有时候 Hook 配置在 arch/arm64/Kconfig 或 kernel/Kconfig.hook）
          if [ -z "$MANUAL_CONF" ]; then
            MANUAL_CONF=$(find . -name "Kconfig*" -exec grep -l "Manual" {} \; | xargs awk '/^config KSU.*[Mm]anual/{print $2}' | head -1)
          fi
          # 保底：使用最常见的命名
          if [ -z "$MANUAL_CONF" ]; then
            echo "WARNING: Could not auto‑detect Manual Hook config name, falling back to CONFIG_KSU_MANUAL_HOOK"
            MANUAL_CONF="CONFIG_KSU_MANUAL_HOOK"
          fi
          echo "Using Manual Hook config: ${MANUAL_CONF}=y"

          # 3. 注入必需配置（包括 Manual Hook、SUSFS、kallsyms）
          DEFCONFIG="arch/arm64/configs/${{ env.DEFCONFIG_NAME }}"
          cat >> "$DEFCONFIG" << EOF
          CONFIG_KALLSYMS=y
          CONFIG_KALLSYMS_ALL=y
          CONFIG_KSU=y
          CONFIG_KSU_SUSFS=y
          ${MANUAL_CONF}=y
          # CONFIG_KSU_WITH_KPROBES is not set
          EOF

          # 4. 生成最终 .config
          mkdir -p out
          make ARCH=arm64 O=out ${{ env.DEFCONFIG_NAME }}
          make ARCH=arm64 O=out olddefconfig

          # 5. 确保 drivers/kernelsu 会被编译
          if ! grep -q "kernelsu/" drivers/Makefile; then
            echo 'obj-y += kernelsu/' >> drivers/Makefile
          fi

          # 6. 验证关键符号（防错机制）
          echo "Checking for critical symbols in source..."
          if grep -rq "ksu_is_init_rc_hook_enabled" drivers/kernelsu/; then
            echo "✓ ksu_is_init_rc_hook_enabled found"
          else
            echo "⚠ Symbol missing, forcing all C files to be compiled"
            find drivers/kernelsu -name "*.c" | while read f; do
              echo "obj-y += ${f%.c}.o" >> drivers/kernelsu/Makefile
            done
          fi

          echo "Extra Kernel Options applied successfully."

      - name: 🧰 Patch Kernel of Re:Kernel
        uses: ./.github/workflows/patch-rekernel

      - name: 🔒 Patch Kernel of Baseband Guard
        uses: ./.github/workflows/patch-baseband-guard

      - name: 🔧 Patch Hide Stuff
        uses: ./.github/workflows/patch-hide-stuff

      - name: 🚀 Build Process
        uses: ./.github/workflows/build-process

      - name: 🔩 Pack Process
        uses: ./.github/workflows/pack-process
