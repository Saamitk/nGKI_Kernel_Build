name: Build Kernel

permissions:
  contents: write
  actions: write

on:
  workflow_call:

jobs:
  # Xiaomi
  name: Build Miatoll Kernel (KSU + SUSFS)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4

      - name: Run nGKI Build Core
        uses: cyberc3dr/nGKI_Kernel_Build@main
        with:
          kernel_source: "https://github.com/RiteshSahany/kernel_xiaomi_sm6250"
          kernel_branch: "14"
          kernel_config: "vendor/miatoll_defconfig"
          kernel_image_name: "Image.gz-dtb"
          clang_branch: "master-kernel-build-2024"
          clang_version: "r522817"
          enable_ksu: "true"
          enable_susfs: "true"
          susfs_version: "v1.4.1"


  # Nothing
  build-nothing-phone-1-lineageos23-a16:
    name: "Nothing Phone (1) (LineageOS 23.0 A16)"
    strategy:
      fail-fast: true
    uses: ./.github/workflows/build-nothing-phone-1-lineageos23-a16.yml
    secrets: inherit

  build-nothing-phone-1-evox-a16-qpr2:
    name: "Nothing Phone (1) (EvolutionX A16 QPR2)"
    strategy:
      fail-fast: true
    uses: ./.github/workflows/build-nothing-phone-1-evox-a16-qpr2.yml
    secrets: inherit  
  
  # OnePlus
  build-oneplus-nord-ce-3-5g-lineageos23-a16:
    name: "OnePlus Nord CE 3 5G (LineageOS 23 A16 QPR2)"
    strategy:
      fail-fast: true
    uses: ./.github/workflows/build-oneplus-nord-ce-3-5g-lineageos23-a16.yml
    secrets: inherit

  build-oneplus-8-series-oos13-a13-xtd:
    name: "Oneplus 8 Series (ColorOS 13 A13 XTD)"
    strategy:
      fail-fast: true
    uses: ./.github/workflows/build-oneplus-8-series-oos13-a13-xtd.yml
    secrets: inherit
